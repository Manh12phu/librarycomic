<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap / Dang ky - Library Comic</title>

    <!-- CSS chung toàn web -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- CSS riêng trang đăng nhập/đăng ký -->
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

<!-- ========================================================
     HEADER — thanh điều hướng trên cùng
     Giữ đơn giản: chỉ logo + nút quay về trang chủ
======================================================== -->
<header>
    <a href="./index.html" class="logo">
        <span class="logo-text">Library<span class="logo-accent">Comic</span></span>
    </a>
    <div class="account" style="margin-left:auto;">
        <a href="./index.html" class="btn-register">Quay ve trang chu</a>
    </div>
    <div class="theme-toggle">
        <div class="toggle-track" onclick="toggleTheme()" title="Chuyển chế độ sáng/tối">
            <div class="toggle-thumb">
                <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
            </div>
        </div>
        <span class="toggle-label" id="themeLabel">Tối</span>
    </div>
</header>


<!-- ========================================================
     NỘI DUNG CHÍNH — form đăng nhập / đăng ký
======================================================== -->
<div class="auth-page">
    <div class="auth-container">

        <!-- TAB ĐIỀU HƯỚNG: chuyển qua lại giữa 2 form -->
        <div class="auth-tabs">
            <button class="auth-tab" id="tabLogin"    onclick="switchTab('login')">   Dang nhap</button>
            <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Dang ky</button>
        </div>

        <!-- ------------------------------------------------
             FORM ĐĂNG NHẬP
             Hiển thị mặc định khi vào trang
        ------------------------------------------------ -->
        <div class="auth-form" id="formLogin">
            <h2>Chao mung tro lai</h2>
            <p class="subtitle">Dang nhap de tiep tuc doc truyen</p>

            <!-- Vùng hiển thị thông báo lỗi / thành công -->
            <div id="loginMessage" class="auth-message"></div>

            <div class="input-group">
                <label>Ten tai khoan</label>
                <input id="loginUser" type="text"
                       placeholder="Nhap ten tai khoan..."
                       autocomplete="username">
            </div>

            <div class="input-group">
                <label>Mat khau</label>
                <input id="loginPass" type="password"
                       placeholder="Nhap mat khau..."
                       autocomplete="current-password">
            </div>

            <button class="submit-btn" onclick="login()">Dang nhap</button>

            <!-- Link chuyển sang tab đăng ký -->
            <div class="auth-switch">
                Chua co tai khoan? <a onclick="switchTab('register')">Dang ky ngay</a>
            </div>
        </div>


        <!-- ------------------------------------------------
             FORM ĐĂNG KÝ
             Ẩn mặc định, hiện khi nhấn tab hoặc ?tab=register
        ------------------------------------------------ -->
        <div class="auth-form" id="formRegister">
            <h2>Tao tai khoan moi</h2>
            <p class="subtitle">Mien phi, doc truyen khong gioi han</p>

            <!-- Vùng hiển thị thông báo lỗi / thành công -->
            <div id="registerMessage" class="auth-message"></div>

            <div class="input-group">
                <label>Ten tai khoan</label>
                <input id="regUser" type="text"
                       placeholder="Chon ten tai khoan..."
                       autocomplete="username">
            </div>

            <div class="input-group">
                <label>Mat khau</label>
                <input id="regPass" type="password"
                       placeholder="It nhat 6 ky tu..."
                       autocomplete="new-password">
            </div>

            <button class="submit-btn" onclick="register()">Dang ky</button>

            <!-- Link chuyển sang tab đăng nhập -->
            <div class="auth-switch">
                Da co tai khoan? <a onclick="switchTab('login')">Dang nhap</a>
            </div>
        </div>

        <!-- Link quay về trang chủ ở đáy hộp -->
        <a href="./index.html" class="back-home">Quay ve trang chu</a>

    </div>
</div>


<!-- ========================================================
     FOOTER
======================================================== -->
<footer>
    <p>&#169; 2026 LibraryComic</p>
</footer>


<!-- ========================================================
     JS: auth.js chứa toàn bộ logic đăng nhập / đăng ký
     (switchTab, login, register, showMsg, initTab)
======================================================== -->
<script src="./js/auth.js"></script>

</body>
</html>
