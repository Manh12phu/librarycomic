<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lich su doc - Library Comic</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
    <a href="./index.html" class="logo">
        <span class="logo-text">Library<span class="logo-accent">Comic</span></span>
    </a>

    <!-- Nút hamburger hiện trên mobile -->
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>

    <!-- Menu điều hướng chính -->
    <nav class="menu" id="mainMenu">
        <a href="./index.html">Trang chu</a>
        <a href="./theodoi.html">Theo doi</a>
        <a href="./lichsu.html" class="active-page">Lich su</a>

        <!-- Dropdown thể loại - chỉ mở khi click -->
        <div class="dropdown" id="genreDropdown">
            <a href="#" class="dropbtn" id="dropbtnLink" onclick="toggleDropdown(event)">The loai</a>
            <div class="dropdown-content" id="dropdownContent">
                <a href="index.html?genre=all">Tat ca</a>
                <a href="index.html?genre=action">Hanh dong</a>
                <a href="index.html?genre=adventure">Phieu luu</a>
                <a href="index.html?genre=isekai">Isekai</a>
                <a href="index.html?genre=romance">Romance</a>
                <a href="index.html?genre=comedy">Hai</a>
            </div>
        </div>

        <!-- Nút đăng nhập/đăng ký trong menu mobile -->
        <div class="menu-auth-mobile" id="mobileAuthArea">
            <a href="./login.html" class="btn-login-mobile">Dang nhap</a>
            <a href="./login.html?tab=register" class="btn-register-mobile">Dang ky</a>
        </div>
    </nav>

    <!-- Thanh tìm kiếm -->
    <div class="search">
        <input type="text" id="searchInput" placeholder="Tim truyen...">
    </div>

    <!-- Nút chuyển sáng/tối -->
    <div class="theme-toggle">
        <button onclick="toggleTheme()">&#9728;</button>
    </div>

    <!-- Nút đăng nhập/đăng ký (desktop) -->
    <div class="account" id="menuAccount">
        <a href="./login.html?tab=register" class="btn-register">Dang ky</a>
        <a href="./login.html" class="btn-login">Dang nhap</a>
    </div>
</header>

<!-- Nội dung trang lịch sử - được render bởi lichsu.js -->
<div class="page-wrap">
    <div class="page-top">
        <h1>Lich su doc</h1>
        <button class="clear-btn" onclick="clearHistory()">Xoa lich su</button>
    </div>

    <!-- Grid hiển thị truyện đã đọc -->
    <div class="manga-list" id="historyList"></div>

    <!-- Hiện khi chưa đọc truyện nào -->
    <div id="emptyHistory" class="empty-state" style="display:none;">
        <p>Ban chua doc truyen nao.</p>
        <a href="./index.html">Kham pha truyen ngay</a>
    </div>
</div>

<footer>
    <p>&#169; 2026 LibraryComic</p>
</footer>

<script src="./js/script.js"></script>
<!-- lichsu.js: load và render lịch sử đọc -->
<script src="./js/lichsu.js"></script>
</body>
</html>
