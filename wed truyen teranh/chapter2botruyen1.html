<!-- Breadcrumb: Trang chu > Ten truyen > Ten chuong -->
<div class="breadcrumb">
    <a href="./index.html">Trang chu</a>
    <span class="sep">&rsaquo;</span>
    <a href="./friendzone.html">Friend Zone</a>
    <span class="sep">&rsaquo;</span>
    <span class="current">Chapter 1</span>
</div>

<!-- Thanh dieu khien sticky (bam theo khi cuon) -->
<div class="reader-controls">
    <div class="reader-title">
        <span>Friend Zone</span> &mdash; Chapter 1
    </div>
    <div class="reader-nav">
        <!-- id prevLink/nextLink dung boi reader.js cho phim tat -->
        <a href="#" id="prevLink">
            <button class="nav-btn" disabled>&lsaquo; Truoc</button>
        </a>
        <!-- Nut chon chuong - toggleChapterDrop() trong reader.js -->
        <div class="chapter-select-wrap">
            <button class="chapter-select-btn" onclick="toggleChapterDrop(event)">
                Chuong 1 / 2
            </button>
            <div class="chapter-dropdown" id="chapterDrop">
                <a href="./chapter2botruyen1.html" class="active">Chapter 1</a>
                <a href="./chapter2botruyen2.html" class="">Chapter 2</a>
            </div>
        </div>
        <a href="./chapter2botruyen2.html" id="nextLink">
            <button class="nav-btn" >Sau &rsaquo;</button>
        </a>
    </div>
</div>

<!-- Anh truyen - duoc tai tu dong boi script.js dua vao data-* -->
<div class="reader-images"
    id="chapterImages"
    data-manga="friendzone"
    data-chapter="chapter1"
    data-pages="10"">
</div>

<!-- Thanh dieu khien duoi (sau khi doc xong) -->
<div class="reader-bottom">
    <a href="#"><button class="nav-btn" disabled>&lsaquo; Chuong truoc</button></a>

    <div class="comment-input">
        <input type="text" id="nameInput" placeholder="Ten cua ban">
        <textarea id="commentInput" placeholder="Viet binh luan..."></textarea>
        <button onclick="addComment()">Gui</button>
    </div>
    <div id="commentList"></div>
</div>

<footer><p>&#169; 2026 LibraryComic</p></footer>

<!-- script.js: ham chung (menu, theme, tai anh chapter...) -->
